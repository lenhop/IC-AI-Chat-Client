<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IC AI Chat (M1)</title>
  <link rel="stylesheet" href="/static/css/chat.css" />
</head>
<body>
  <div class="app" data-redis-sessions="{{ 'true' if redis_sessions_enabled else 'false' }}">
    <header class="topbar">
      <h1 class="title">IC AI Chat</h1>
      <div class="meta">
        <span class="meta-item">模型: <strong>{{ model_name }}</strong></span>
        <span class="meta-item">后端: <strong>{{ backend_name }}</strong></span>
        {% if user_id %}
        <span class="meta-item">用户: {{ user_id }}</span>
        {% endif %}
      </div>
    </header>

    <main class="main">
      <div id="banner" class="banner banner--hidden" role="alert"></div>
      <div id="messages" class="messages" aria-live="polite"></div>
    </main>

    <footer class="composer">
      <label class="sr-only" for="user-input">消息输入</label>
      <textarea
        id="user-input"
        class="input"
        rows="3"
        placeholder="输入消息后按发送（Shift+Enter 换行）"
        autocomplete="off"
      ></textarea>
      <div class="composer-actions">
        <button type="button" id="btn-send" class="btn btn-primary">发送</button>
        <button type="button" id="btn-stop" class="btn btn-secondary" disabled>停止</button>
      </div>
    </footer>
  </div>

  <script src="/static/js/chat.js"></script>
</body>
</html>
